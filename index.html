<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="Stylesheet" href="style.css">
</head>

<body>
  <section id="container">
    <div class="cart">
      <div class="search">
        <input type="text" id="inputSearch" placeholder="Enter city name" spellcheck="false">
        <button id="searchBtn" class="searchBtn">Search</button>
      </div>
      <div class="weather">
        <img class="imgsize" src="image/rain.jpeg" class="weather-icon">
        <div>
          <h1 id="temp" class="temp">---</h1>
          <h2 id="city" class="city">---</h2>
        </div>
        <div class="details">
          <div class="col">
            <img class="imgsize" src="image/humidity.png">
            <div>
              <p id="humidity" class="humidity">--</p>
              <p>humdity</p>
            </div>
          </div>
          <div class="col">
            <img class="imgsize" src="image/wind.png">
            <div>
              <p id="wind" class="wind">--</p>
              <p>wind speed</p>
            </div>
          </div>
        </div>
      </div>
    </div> 
  </section>
  <script src="./script.js"></script>
</body>

</html>
